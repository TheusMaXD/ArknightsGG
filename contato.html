<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arknights Endfield - Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-bar">
            <span class="header-title">
                <img src="img/ArknightsGG_Logo.png" alt="ArknightsGG Logo" style="height: 60px; width: auto; vertical-align: middle;" />
            </span>
            <nav class="header-nav">
                <button onclick="location.href='index.html'">Home</button>
                <button onclick="location.href='personagens.html'">Personagens</button>
                <button onclick="location.href='builds.html'">Builds</button>
                <button onclick="location.href='guias.html'">Guias</button>
                <button onclick="location.href='contato.html'">Contato</button>
            </nav>
            <div class="header-logo">
                <img src="img/ArknightsEndfieldLogo.webp" alt="Logo ArknightsGG" />
            </div>
        </div>
    </header>
    <div class="container" style="max-width: 500px; margin: 2rem auto;">
        <section style="display:flex; flex-direction:column; align-items:center; margin-bottom:2.5rem; background:linear-gradient(90deg,#8fd3f4 0%,#84fab0 100%); border-radius:18px; box-shadow:0 4px 18px rgba(49,55,57,0.10); padding:2rem 1rem 1.5rem 1rem;">
            <img src="img/naruto.jpg" alt="Perfil" style="width:100px; height:100px; border-radius:50%; box-shadow:0 2px 12px rgba(49,55,57,0.18); margin-bottom:1rem; border:4px solid #fff;">
            <h2 style="margin:0 0 0.5rem 0; font-size:1.5rem; color:#222; letter-spacing:1px;">Olá! Eu sou <span style="color:#5865F2;">TheusMaXD</span></h2>
            <p style="margin:0 0 1.2rem 0; color:#333; font-size:1.08rem; text-align:center; max-width:350px;">Sou desenvolvedor web e apaixonado por Arknights! Entre em contato comigo pelas redes abaixo ou envie sua mensagem pelo formulário.</p>
            <div style="display:flex; gap:1.2rem;">
                <a href="https://discord.com/users/SEU_DISCORD_ID" target="_blank" title="Discord" style="text-decoration:none;">
                    <button style="display:flex;align-items:center;gap:0.5rem;background:#5865F2;color:#fff;font-weight:600;padding:0.6rem 1.2rem;border:none;border-radius:10px;box-shadow:0 2px 8px rgba(49,55,57,0.10);cursor:pointer;transition:box-shadow 0.2s,filter 0.2s;outline:none;font-size:1.08rem;letter-spacing:0.5px;position:relative;overflow:hidden;">
                        <img src="img/discord.webp" alt="Discord" style="width:24px; height:24px;">
                        Discord
                    </button>
                </a>
                <a href="mailto:seu@email.com" title="Email" style="text-decoration:none;">
                    <button style="display:flex;align-items:center;gap:0.5rem;background:#fff;color:#222;font-weight:600;padding:0.6rem 1.2rem;border:1.5px solid #8fd3f4;border-radius:10px;box-shadow:0 2px 8px rgba(49,55,57,0.10);cursor:pointer;transition:box-shadow 0.2s,filter 0.2s;outline:none;font-size:1.08rem;letter-spacing:0.5px;position:relative;overflow:hidden;">
                        <img src="img/gmail.webp" alt="Email" style="width:24px; height:24px;">
                        Email
                    </button>
                </a>
                <a href="https://github.com/TheusMaXD" target="_blank" title="GitHub" style="text-decoration:none;">
                    <button style="display:flex;align-items:center;gap:0.5rem;background:#222;color:#fff;font-weight:600;padding:0.6rem 1.2rem;border:none;border-radius:10px;box-shadow:0 2px 8px rgba(49,55,57,0.10);cursor:pointer;transition:box-shadow 0.2s,filter 0.2s;outline:none;font-size:1.08rem;letter-spacing:0.5px;position:relative;overflow:hidden;">
                        <img src="img/github.png" alt="GitHub" style="width:24px; height:24px;filter:invert(1);">
                        GitHub
                    </button>
                </a>
            </div>
        </section>
        <h2 style="text-align:center; margin-bottom:1.5rem;">Fale conosco</h2>
        <form style="display:flex; flex-direction:column; gap:1rem;">
            <label for="nome" style="font-weight:600; color:#333;">Nome:</label>
            <input type="text" id="nome" name="nome" required style="padding:0.7rem; border-radius:8px; border:1.5px solid #8fd3f4; font-size:1.05rem; background:#f8fafd; transition:border 0.2s;">
            <label for="email" style="font-weight:600; color:#333;">Email:</label>
            <input type="email" id="email" name="email" required style="padding:0.7rem; border-radius:8px; border:1.5px solid #8fd3f4; font-size:1.05rem; background:#f8fafd; transition:border 0.2s;">
            <label for="mensagem" style="font-weight:600; color:#333;">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="5" required style="padding:0.7rem; border-radius:8px; border:1.5px solid #8fd3f4; font-size:1.05rem; background:#f8fafd; transition:border 0.2s;"></textarea>
            <button type="submit" style="background:linear-gradient(90deg,#8fd3f4 0%,#84fab0 100%);color:#222;font-weight:700;padding:0.8rem 1.7rem;border:none;border-radius:10px;box-shadow:0 2px 18px rgba(49,55,57,0.18);cursor:pointer;transition:box-shadow 0.2s,background 0.3s,filter 0.2s; font-size:1.13rem; letter-spacing:0.5px;position:relative;overflow:hidden;">
                <span style="display:inline-flex;align-items:center;gap:0.5rem;">
                    <svg style="width:22px;height:22px;vertical-align:middle;" fill="none" stroke="#222" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
                    Enviar
                </span>
            </button>
        </form>
    </div>
    <footer class="site-footer">
        <div class="footer-content">
            &copy; 2026 ArknightsGG. Todos os direitos reservados.
        </div>
    </footer>
</body>
</html>
