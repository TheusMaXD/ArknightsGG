<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arknights Endfield - Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-bar">
            <span class="header-title">
                <img src="img/ArknightsGG_Logo.png" alt="ArknightsGG Logo" style="height: 60px; width: auto; vertical-align: middle;" />
            </span>
            <nav class="header-nav">
                <button onclick="location.href='index.html'">Home</button>
                <button onclick="location.href='personagens.html'">Personagens</button>
                <button onclick="location.href='builds.html'">Builds</button>
                <button onclick="location.href='guias.html'">Guias</button>
                <button onclick="location.href='contato.html'">Contato</button>
            </nav>
            <div class="header-logo">
                <img src="img/ArknightsEndfieldLogo.webp" alt="Logo ArknightsGG" />
            </div>
        </div>
    </header>
    <div class="container" style="max-width: 500px; margin: 2rem auto;">
                <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:2rem;">
                    <img src="img/naruto.jpg" alt="Perfil" style="width:90px; height:90px; border-radius:50%; box-shadow:0 2px 8px rgba(49,55,57,0.10); margin-bottom:1rem;">
                    <h3 style="margin:0 0 0.5rem 0;">Olá! Eu sou TheusMaXD</h3>
                    <div style="display:flex; gap:1rem;">
                        <a href="https://discord.com/users/SEU_DISCORD_ID" target="_blank" title="Discord" style="text-decoration:none;">
                            <img src="img/discord.webp" alt="Discord" style="width:36px; height:36px; border-radius:8px; background:#5865F2; padding:4px;">
                        </a>
                        <a href="mailto:seu@email.com" title="Email" style="text-decoration:none;">
                            <img src="img/gmail.webp" alt="Email" style="width:36px; height:36px; border-radius:8px; background:#fff; padding:4px; border:1px solid #ccc;">
                        </a>
                        <a href="https://github.com/TheusMaXD" target="_blank" title="GitHub" style="text-decoration:none;">
                            <img src="img/github.png" alt="GitHub" style="width:36px; height:36px; border-radius:8px; background:#222; padding:4px;">
                        </a>
                    </div>
                </div>
        <h2 style="text-align:center; margin-bottom:1.5rem;">Fale conosco</h2>
        <form style="display:flex; flex-direction:column; gap:1rem;">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required style="padding:0.6rem; border-radius:6px; border:1px solid #ccc;">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required style="padding:0.6rem; border-radius:6px; border:1px solid #ccc;">
            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="5" required style="padding:0.6rem; border-radius:6px; border:1px solid #ccc;"></textarea>
            <button type="submit" style="background:linear-gradient(90deg,#8fd3f4 0%,#84fab0 100%);color:#222;font-weight:600;padding:0.7rem 1.5rem;border:none;border-radius:8px;box-shadow:0 2px 8px rgba(49,55,57,0.10);cursor:pointer;transition:box-shadow 0.2s,background 0.3s;">Enviar</button>
        </form>
    </div>
    <footer class="site-footer">
        <div class="footer-content">
            &copy; 2026 ArknightsGG. Todos os direitos reservados.
        </div>
    </footer>
</body>
</html>
